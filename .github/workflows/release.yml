name: Release

on:
  workflow_dispatch:
    inputs:
      deploy_runtime:
        description: Roll out the released runtime to the configured server over SSH
        required: true
        type: boolean
        default: false
      version:
        description: Explicit semver release version
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event.inputs.version }}
    outputs:
      ghcr_owner: ${{ steps.release_metadata.outputs.ghcr_owner }}
      release_version: ${{ steps.release_metadata.outputs.release_version }}
      version_tag: ${{ steps.release_metadata.outputs.version_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Guard default branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Release workflow must run from the default branch" >&2
            exit 1
          fi

      - name: Ensure release tag does not exist
        run: |
          if git rev-parse "refs/tags/v${RELEASE_VERSION}" >/dev/null 2>&1; then
            echo "Release tag already exists: v${RELEASE_VERSION}" >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run shared tests
        run: pnpm --filter @dockeradmin/shared test

      - name: Run API tests
        run: pnpm --filter @dockeradmin/api test

      - name: Run web tests
        run: pnpm --filter @dockeradmin/web test

      - name: Run build
        run: pnpm build

      - name: Synchronize workspace versions
        run: node scripts/release-version.mjs "${RELEASE_VERSION}"

      - name: Prepare GHCR image refs
        id: image_refs
        env:
          RELEASE_OWNER: ${{ github.repository_owner }}
        run: node scripts/release-images.mjs "${RELEASE_OWNER}" "${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        id: release_metadata
        env:
          RELEASE_OWNER: ${{ github.repository_owner }}
        run: |
          printf 'ghcr_owner=%s\n' "$(printf '%s' "${RELEASE_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          printf 'release_version=%s\n' "${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          printf 'version_tag=v%s\n' "${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure release git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit release version bump
        run: 'git commit --all -m "chore(release): v${RELEASE_VERSION}"'

      - name: Create release tag
        run: git tag "v${RELEASE_VERSION}"

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.image_refs.outputs.api_image }}
          labels: |
            org.opencontainers.image.title=dockeradmin-api
            org.opencontainers.image.version=${{ steps.image_refs.outputs.version_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.image_refs.outputs.web_image }}
          labels: |
            org.opencontainers.image.title=dockeradmin-web
            org.opencontainers.image.version=${{ steps.image_refs.outputs.version_tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Push release commit and tag
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "v${RELEASE_VERSION}"

  deploy_runtime:
    runs-on: ubuntu-latest
    needs:
      - release
    if: ${{ github.event.inputs.deploy_runtime == 'true' }}
    env:
      GHCR_OWNER: ${{ needs.release.outputs.ghcr_owner }}
      RELEASE_VERSION: ${{ needs.release.outputs.release_version }}

    steps:
      - name: Configure SSH client
        env:
          DEPLOY_RUNTIME_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_RUNTIME_SSH_KNOWN_HOSTS }}
          DEPLOY_RUNTIME_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_RUNTIME_SSH_PRIVATE_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "${DEPLOY_RUNTIME_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${DEPLOY_RUNTIME_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Roll out released runtime over SSH
        env:
          DEPLOY_RUNTIME_APP_DIR: ${{ secrets.DEPLOY_RUNTIME_APP_DIR }}
          DEPLOY_RUNTIME_SSH_HOST: ${{ secrets.DEPLOY_RUNTIME_SSH_HOST }}
          DEPLOY_RUNTIME_SSH_PORT: ${{ secrets.DEPLOY_RUNTIME_SSH_PORT }}
          DEPLOY_RUNTIME_SSH_USER: ${{ secrets.DEPLOY_RUNTIME_SSH_USER }}
        run: |
          ssh -p "${DEPLOY_RUNTIME_SSH_PORT}" "${DEPLOY_RUNTIME_SSH_USER}@${DEPLOY_RUNTIME_SSH_HOST}" "
            set -e
            cd '${DEPLOY_RUNTIME_APP_DIR}'
            git fetch --tags origin
            git checkout v${RELEASE_VERSION}
            GHCR_OWNER='${GHCR_OWNER}' IMAGE_TAG='v${RELEASE_VERSION}' docker compose --env-file .env -f infra/docker-compose.runtime.yml config
            GHCR_OWNER='${GHCR_OWNER}' IMAGE_TAG='v${RELEASE_VERSION}' docker compose --env-file .env -f infra/docker-compose.runtime.yml pull api web
            GHCR_OWNER='${GHCR_OWNER}' IMAGE_TAG='v${RELEASE_VERSION}' docker compose --env-file .env -f infra/docker-compose.runtime.yml up -d
          "

  draft_release:
    runs-on: ubuntu-latest
    needs:
      - release
      - deploy_runtime
    if: ${{ always() && needs.release.result == 'success' && (github.event.inputs.deploy_runtime != 'true' || needs.deploy_runtime.result == 'success') }}
    env:
      GITHUB_TOKEN: ${{ github.token }}
      RELEASE_VERSION: ${{ needs.release.outputs.release_version }}

    steps:
      - name: Create draft GitHub Release
        run: gh release create "v${RELEASE_VERSION}" --repo "${GITHUB_REPOSITORY}" --draft --generate-notes --title "v${RELEASE_VERSION}"
